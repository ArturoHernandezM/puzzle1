<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reconstrucción estructural</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#072146;
  margin:0;
  padding:20px;
  text-align:center;
  overflow:auto; /* ✅ permite scroll si es necesario */
}

.header{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:25px;
  margin-bottom:12px;
}

audio{
  height:30px;
  filter:brightness(1.1);
}

.header h1{
  margin:0;
  font-size:26px;
  color:#ffffff;
}

:root{
  --image-size: 105px;
}

.board{
  display:flex;
  align-items:center;
  width:fit-content;
  margin:0 auto; /* ✅ centrado real */
  background:white;
  padding:9px;
  border-radius:9px;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
  position:relative;
}

.fixed-piece img,
.piece img{
  height:var(--image-size);  /* ✅ control por altura */
  width:auto;
  display:block;
}

.piece{
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:grab;
  transition:transform 0.2s ease;
}

.piece:active{
  transform:scale(1.05);
}

.pieces{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
  margin-top:15px;
  min-height:170px;
}

.controls{
  margin-top:10px;
}

button{
  padding:8px 16px;
  font-size:14px;
  border:none;
  border-radius:6px;
  background:#222;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#444;
}

button:disabled{
  background:#999;
  cursor:not-allowed;
}

#attempts{
  margin-top:6px;
  font-size:14px;
  color:white;
}

/* Overlay */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.6s ease;
}

.overlay-content{
  background:white;
  padding:40px 60px;
  border-radius:12px;
  font-size:24px;
}

.show{
  opacity:1;
  pointer-events:auto;
}

/* Palomita verde */
#successMark{
  position:absolute;
  right:-70px;
  top:50%;
  transform:translateY(-50%) scale(0);
  font-size:60px;
  color:#2e7d32;
  transition:transform 0.4s ease;
}

#successMark.show{
  transform:translateY(-50%) scale(1.2);
}
audio{
  height:28px;
  transform:scale(0.9);
}
</style>
</head>

<body>

<div class="header">
  <h1>Reconstruye la frase musical</h1>
  <audio id="modelPlayer" controls>
    <source src="modelo.mp3" type="audio/mpeg">
  </audio>
</div>

<div class="board" id="board">
  <div class="fixed-piece">
    <img src="0.png">
  </div>
  <div id="successMark">✔</div>
</div>

<div class="pieces" id="piecesContainer"></div>

<div class="controls">
  <button id="verifyBtn" onclick="checkOrder()">Verificar</button>
  <button id="retryBtn" onclick="resetGame()" style="display:none;">Reintentar</button>
  <div id="attempts">Intentos: 0</div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-content" id="overlayMessage"></div>
</div>

<!-- Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

const correctOrder = [1,2,3,4,5,6,7,8];
const distractors = [];   // piezas extra
let attempts = 0;
let gameFinished = false;

const clickSound = new Audio("click.mp3");
const successSound = new Audio("success.mp3");
const modelSound = new Audio("modelo.mp3");
const wrongSound = new Audio("error.mp3");

function playModel(){
  const player = document.getElementById("modelPlayer");
  player.currentTime = 0;
  player.play();
}

const board = document.getElementById("board");
const piecesContainer = document.getElementById("piecesContainer");
const overlay = document.getElementById("overlay");
const overlayMessage = document.getElementById("overlayMessage");

/* Crear piezas */
let pieces = [...correctOrder, ...distractors];
pieces.sort(()=>Math.random()-0.5);

pieces.forEach(num=>{
  const div=document.createElement("div");
  div.classList.add("piece");
  div.setAttribute("draggable","true");
  div.dataset.id=num;
  div.innerHTML=`<img src="${num}.png">`;

  let currentFragment = null;

div.addEventListener("click",()=>{

  if(currentFragment){
    currentFragment.pause();
    currentFragment.currentTime = 0;
  }

  currentFragment = new Audio(`${num}.mp3`);
  currentFragment.play();

});

  piecesContainer.appendChild(div);
});

/* Drag & Drop */
let dragged=null;

document.addEventListener("dragstart", e=>{
  if(e.target.closest(".piece")){
    dragged=e.target.closest(".piece");
    const img = dragged.querySelector("img");
    e.dataTransfer.setDragImage(img, img.width/2, img.height/2);
  }
});

document.addEventListener("dragover", e=>e.preventDefault());

document.addEventListener("drop", e=>{
  e.preventDefault();
  if(!dragged || gameFinished) return;

  const mouseX = e.clientX;
  const piecesInBoard = [...board.querySelectorAll(".piece")];
  let inserted = false;

  for(let piece of piecesInBoard){
    const rect = piece.getBoundingClientRect();
    const center = rect.left + rect.width/2;

    if(mouseX < center){
      board.insertBefore(dragged, piece);
      inserted = true;
      break;
    }
  }

  if(!inserted){
    board.appendChild(dragged);
  }

  // 🔥 CONTROL DE MÁXIMO 8 PIEZAS
  const updatedPieces = [...board.querySelectorAll(".piece")];

  if(updatedPieces.length > correctOrder.length){
    const lastPiece = updatedPieces[updatedPieces.length - 1];

    // animación suave al regresar
    lastPiece.style.transform = "translateY(40px)";
    lastPiece.style.opacity = "0";

    setTimeout(()=>{
      piecesContainer.appendChild(lastPiece);
      lastPiece.style.transform = "translateY(0)";
      lastPiece.style.opacity = "1";
    },300);
  }

  clickSound.currentTime=0;
  clickSound.play();
});
/* Verificar */
function checkOrder(){

  if(gameFinished) return;

  attempts++;
  document.getElementById("attempts").textContent="Intentos: "+attempts;

  const currentOrder = [...board.children]
    .filter(el => el.classList.contains("piece"))
    .map(p => parseInt(p.dataset.id));

  if(currentOrder.length !== correctOrder.length){

  wrongSound.currentTime = 0;
  wrongSound.play();

  showOverlay("La frase debe tener exactamente " + correctOrder.length + " fragmentos.");
  return;
}

  if(JSON.stringify(currentOrder) === JSON.stringify(correctOrder)){

    successSound.play();
    showOverlay("¡Correcto! Felicidades!! 🎉");
    gameFinished = true;

    document.getElementById("verifyBtn").disabled = true;
    document.getElementById("retryBtn").style.display = "inline-block";
    document.getElementById("successMark").classList.add("show");

    playModel();
    launchConfetti();

  }else{

  wrongSound.currentTime = 0;
  wrongSound.play();

  showOverlay("Hay fragmentos incorrectos. Puedes corregir.");
}
}

function showOverlay(text){
  overlayMessage.textContent = text;
  overlay.classList.add("show");

  setTimeout(()=>{
    overlay.classList.remove("show");
  },2800);
}

function resetGame(){
  location.reload();
}

function launchConfetti(){
  confetti({
    particleCount:150,
    spread:90,
    origin:{ y:0.6 }
  });
}

</script>

</body>
</html>
